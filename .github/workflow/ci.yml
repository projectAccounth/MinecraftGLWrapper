name: CITasks

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: "8"
        distribution: "temurin"
        cache: gradle

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload Subproject Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: subproject-jars
        path: |
          core/build/libs/*.jar
          joml/build/libs/*.jar
